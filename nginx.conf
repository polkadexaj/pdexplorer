# Compress text-ish assets. gzip_static would serve pre-compressed files if
# Vite ever emits .gz alongside originals; for now on-the-fly gzip is enough.
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/wasm
    application/x-font-ttf
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# --- Cloudflare real-IP trust -----------------------------------------------
# When the site is fronted by Cloudflare's proxy, every connection nginx sees
# is from a Cloudflare edge node. Without these directives, $remote_addr and
# the access log would only ever show Cloudflare IPs — bad for rate limiting,
# fail2ban, and debugging. set_real_ip_from + real_ip_header tell nginx to
# trust the CF-Connecting-IP header from connections originating in
# Cloudflare's published ranges, and use it as $remote_addr.
#
# Source of truth: https://www.cloudflare.com/ips-v4 and /ips-v6
# Last sync: 2025 — re-check when rebuilding the frontend image. The
# provisioning script `provision-ubuntu.sh cloudflare` refreshes the host's
# UFW rules but does NOT update this baked-in nginx list — to refresh nginx
# you must rebuild the frontend image.
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
# `recursive on` lets nginx walk back through trusted proxies if there's ever
# a chain (e.g. Cloudflare → another proxy → us). Harmless when Cloudflare is
# the only proxy.
real_ip_recursive on;

# Common headers we want on every response. `map` lets us reuse them
# from both server blocks without duplicating.
map $sent_http_content_type $cache_control_for_type {
    default                          "public, max-age=300";
    ~^text/html                      "no-cache, no-store, must-revalidate";
    ~^application/javascript         "public, max-age=31536000, immutable";
    ~^text/css                       "public, max-age=31536000, immutable";
    ~^image/                         "public, max-age=2592000";
    ~^font/                          "public, max-age=31536000, immutable";
    ~^application/font               "public, max-age=31536000, immutable";
    ~^application/manifest\+json     "public, max-age=86400";
    ~^application/xml                "public, max-age=300";
    ~^text/plain                     "public, max-age=300";
    # JSON responses come from the /api/* backend, which sets its own tiered
    # Cache-Control via cacheShort/cacheMedium/cacheLong in server.js. Empty
    # string here tells nginx's add_header to skip the directive entirely
    # (per its docs), so the backend's value passes through cleanly without
    # being duplicated. Removing this entry would re-introduce the "two
    # Cache-Control headers" bug.
    ~^application/json               "";
}

server {
    listen 80;
    server_name explorer.polkadex.ee;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Check if traffic is coming from a proxy (like Cloudflare) that already did HTTPS
        set $do_redirect 0;
        if ($http_x_forwarded_proto != "https") {
            set $do_redirect 1;
        }
        # If it's a direct HTTP hit (no proxy), redirect to HTTPS
        if ($do_redirect = 1) {
            return 301 https://$host$request_uri;
        }

        # Otherwise serve the content directly (Cloudflare Flexible SSL)
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # SEO surfaces — served by the backend so the sitemap can be generated
    # dynamically from the SQLite index.
    location = /robots.txt {
        proxy_pass http://backend:3001/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /sitemap.xml {
        proxy_pass http://backend:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name explorer.polkadex.ee;

    ssl_certificate /etc/letsencrypt/live/explorer.polkadex.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.polkadex.ee/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers that crawlers and SEO scorers grade favorably. CSP is
    # intentionally permissive because the SPA loads scripts from a handful
    # of CDNs (chart.js, qrcode, boxicons, fonts).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cache-Control $cache_control_for_type always;

    # Hashed JS/CSS bundles emitted by Vite — long-lived, immutable cache.
    location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SEO surfaces (dynamic) — proxied to backend.
    location = /robots.txt {
        proxy_pass http://backend:3001/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /sitemap.xml {
        proxy_pass http://backend:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback — every clean-URL route (/blocks, /validator/<addr>, …)
        # resolves to index.html so the client router can take it from there.
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
