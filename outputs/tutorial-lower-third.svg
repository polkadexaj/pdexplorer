<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lower-third caption template (reusable per shot).

  Designed to sit at the bottom-left of a 1920x1080 frame. The viewBox is the
  full 1920x1080 so the editor can drop it straight in and the position is
  consistent across every shot.

  To repurpose per step, duplicate this file and edit two strings:
    <text id="step-number">1</text>
    <text id="step-label">Connect your wallet</text>

  Suggested animation in the editor:
    Frame in:  slide from x=-400 to x=120 over 12 frames, ease-out cubic.
    Hold:      ~3 seconds (or as long as the narrator is on the step).
    Frame out: slide x=120 → x=-400 over 12 frames, ease-in cubic.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <defs>
    <!-- Banner background: dark surface with a subtle inner glow -->
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#12121A" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <!-- Banner sits at y=920, 880 wide, 110 tall -->
  <g transform="translate(80, 920)">

    <!-- Drop shadow -->
    <rect x="0" y="6" width="880" height="110" rx="12" ry="12"
          fill="#000000" opacity="0.4"/>

    <!-- Main banner -->
    <rect x="0" y="0" width="880" height="110" rx="12" ry="12"
          fill="url(#bannerBg)"
          stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Left brand-pink accent rail -->
    <rect x="0" y="0" width="6" height="110" rx="3" ry="3" fill="#E6007A"/>

    <!-- Step-number circle -->
    <circle cx="80" cy="55" r="32" fill="#E6007A"/>
    <text id="step-number"
          x="80" y="70"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-weight="800"
          font-size="36"
          fill="#FFFFFF"
          text-anchor="middle">1</text>

    <!-- Eyebrow + step label -->
    <text x="142" y="46"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="16"
          letter-spacing="4"
          fill="#00E676">STEP</text>

    <text id="step-label"
          x="142" y="86"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="34"
          fill="#FFFFFF">Connect your wallet</text>

  </g>

</svg>
