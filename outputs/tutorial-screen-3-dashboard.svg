    <!-- My Validators teaser -->
    <g transform="translate(0, 410)" opacity="0.65">
      <rect x="0" y="0" width="750" height="220" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">My Validators</text>
      <text x="20" y="60" font-family="'Inter', sans-serif" font-size="12" fill="#9CA3AF">3 nominated</text>

      <rect x="790" y="0" width="750" height="220" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="810" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Recent staking rewards</text>
    </g>
