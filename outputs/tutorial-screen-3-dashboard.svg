        <text x="110" y="22" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Stake more</text>
      </g>

      <!-- Pay out -->
      <g transform="translate(500, 50)">
        <rect x="0" y="0" width="220" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="110" y="22" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#9CA3AF" text-anchor="middle">Pay out rewards (3)</text>
      </g>

      <!-- Unstake -->
      <g transform="translate(740, 50)">
        <rect x="0" y="0" width="220" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="110" y="22" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Unstake</text>
      </g>
