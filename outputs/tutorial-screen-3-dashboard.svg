<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shot 3 - Wallet Dashboard with "Stake more" action highlighted.
  Behind narration: "From the dashboard, click Stake more."
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#08080C"/>

  <!-- Sidebar (faded) -->
  <rect x="0" y="0" width="260" height="1080" fill="#12121A" opacity="0.6"/>
  <g opacity="0.4">
    <text x="50" y="60" font-family="'Inter', sans-serif" font-weight="800" font-size="18" fill="#E6007A">POLKADEX</text>
    <rect x="16" y="426" width="228" height="40" rx="6" fill="rgba(230,0,122,0.12)"/>
    <text x="40" y="452" font-family="'Inter', sans-serif" font-size="15" fill="#E6007A" font-weight="700">My Account</text>
  </g>

  <!-- Topbar -->
  <rect x="260" y="0" width="1660" height="68" fill="#12121A"/>

  <g transform="translate(300, 110)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#9CA3AF">WALLET DASHBOARD</text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">Validator 8</text>
    <text x="0" y="84" font-family="'Courier New', monospace" font-size="14" fill="#9CA3AF">e8ab9d4fJpX7nVeMcRtY3qC2…</text>

    <!-- Stat cards -->
    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Total balance</text>
      <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">1,250.0000 PDEX</text>

      <g transform="translate(390, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Total staked</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#E6007A">820.0000 PDEX</text>
      </g>

      <g transform="translate(780, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Claimed rewards</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#00E676">42.7185 PDEX</text>
      </g>

      <g transform="translate(1170, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Unpaid rewards</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">3.2104 PDEX</text>
      </g>
    </g>

    <!-- Action bar - 4 buttons; "Stake more" is highlighted -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="1540" height="92" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#9CA3AF">ACTIONS</text>

      <!-- Send PDEX -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="220" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="110" y="22" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Send PDEX</text>
      </g>

      <!-- Stake more (highlighted - this is the callout target) -->
      <g transform="translate(260, 50)">
        <rect x="-6" y="-6" width="232" height="44" rx="8" fill="rgba(230,0,122,0.15)" stroke="#E6007A" stroke-width="2"/>
