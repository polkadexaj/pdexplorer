  <!-- Annotation -->
  <g>
    <defs>
      <marker id="arrow3" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="14" markerHeight="14" orient="auto">
        <polygon points="0,0 12,6 0,12" fill="#E6007A"/>
      </marker>
    </defs>
    <path d="M 620 530 Q 580 480 580 425"
          stroke="#E6007A" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>
    <rect x="450" y="540" width="380" height="80" rx="10" fill="rgba(230,0,122,0.12)" stroke="#E6007A" stroke-width="2"/>
    <text x="470" y="574" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#E6007A" font-weight="700">PRIMARY ACTION</text>
    <text x="470" y="604" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Click Stake more</text>
  </g>

  <!-- Lower-third -->
  <g transform="translate(80, 920)">
    <rect x="0" y="0" width="880" height="110" rx="12" fill="#12121A"/>
    <rect x="0" y="0" width="6" height="110" rx="3" fill="#E6007A"/>
    <circle cx="80" cy="55" r="32" fill="#E6007A"/>
    <text x="80" y="70" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="142" y="46" font-family="'Inter', sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#00E676">STEP</text>
    <text x="142" y="86" font-family="'Inter', sans-serif" font-weight="700" font-size="34" fill="#FFFFFF">Pick a validator</text>
  </g>

</svg>
