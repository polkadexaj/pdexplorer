<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shot 4 - Stake modal with validator picker + amount field.
  Behind narration: amount entry + Stake submission. The modal sits over a
  dimmed dashboard so the focus is unambiguous.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#08080C"/>

  <!-- Dimmed background dashboard hint -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.6)"/>

  <!-- Modal -->
  <g transform="translate(440, 80)">
    <rect x="0" y="0" width="1040" height="920" rx="16" fill="#12121A" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Close X (decorative) -->
    <text x="1000" y="48" font-family="'Inter', sans-serif" font-size="28" fill="#9CA3AF" text-anchor="middle">×</text>

    <!-- Heading + help icon -->
    <text x="40" y="50" font-family="'Inter', sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">Stake &amp; Nominate</text>
    <circle cx="282" cy="44" r="11" fill="rgba(230,0,122,0.2)"/>
    <text x="282" y="48" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#E6007A" text-anchor="middle">?</text>
    <text x="40" y="80" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF">Add to your bond and pick the validators you want to back.</text>

    <!-- Validator search -->
    <text x="40" y="130" font-family="'Inter', sans-serif" font-size="12" letter-spacing="2" fill="#9CA3AF">SEARCH VALIDATORS</text>
    <rect x="40" y="146" width="960" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="56" y="172" font-family="'Inter', sans-serif" font-size="14" fill="#FFFFFF">Validator 8|</text>

    <!-- Validator list -->
    <g transform="translate(40, 210)">
      <!-- Active picks -->
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="12" letter-spacing="2" fill="#9CA3AF">SELECTED · 3 OF 16 MAX</text>

      <g>
        <rect x="0" y="14" width="960" height="46" rx="8" fill="rgba(0,230,118,0.08)" stroke="#00E676"/>
        <circle cx="22" cy="37" r="5" fill="#00E676"/>
        <text x="40" y="42" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Validator 8</text>
        <text x="640" y="42" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">3.0% commission</text>
        <text x="800" y="42" font-family="'Inter', sans-serif" font-size="13" fill="#00E676">15.2% real APY</text>
        <text x="940" y="42" font-family="'Inter', sans-serif" font-size="16" fill="#9CA3AF" text-anchor="end">×</text>
      </g>

      <g transform="translate(0, 60)">
        <rect x="0" y="0" width="960" height="46" rx="8" fill="rgba(0,230,118,0.08)" stroke="#00E676"/>
        <circle cx="22" cy="23" r="5" fill="#00E676"/>
        <text x="40" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Validator 14</text>
        <text x="640" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">5.0% commission</text>
        <text x="800" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#00E676">14.6% real APY</text>
        <text x="940" y="28" font-family="'Inter', sans-serif" font-size="16" fill="#9CA3AF" text-anchor="end">×</text>
      </g>

      <g transform="translate(0, 120)">
        <rect x="0" y="0" width="960" height="46" rx="8" fill="rgba(0,230,118,0.08)" stroke="#00E676"/>
        <circle cx="22" cy="23" r="5" fill="#00E676"/>
        <text x="40" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Validator 22</text>
        <text x="640" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">2.5% commission</text>
        <text x="800" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#00E676">15.8% real APY</text>
        <text x="940" y="28" font-family="'Inter', sans-serif" font-size="16" fill="#9CA3AF" text-anchor="end">×</text>
      </g>

      <text x="0" y="220" font-family="'Inter', sans-serif" font-size="12" letter-spacing="2" fill="#9CA3AF">RECOMMENDED</text>

      <g transform="translate(0, 234)" opacity="0.7">
        <rect x="0" y="0" width="960" height="46" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
        <text x="40" y="28" font-family="'Inter', sans-serif" font-size="14" fill="#FFFFFF">Validator 5</text>
        <text x="640" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">2.0% commission</text>
        <text x="800" y="28" font-family="'Inter', sans-serif" font-size="13" fill="#00E676">15.4% real APY</text>
        <rect x="900" y="13" width="40" height="20" rx="4" fill="rgba(0,230,118,0.15)"/>
        <text x="920" y="27" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#00E676" text-anchor="middle">+ ADD</text>
      </g>
    </g>

    <!-- Amount field -->
    <g transform="translate(40, 590)">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="12" letter-spacing="2" fill="#9CA3AF">AMOUNT (PDEX)</text>
      <rect x="0" y="14" width="960" height="60" rx="8" fill="rgba(230,0,122,0.06)" stroke="#E6007A" stroke-width="2"/>
      <text x="18" y="58" font-family="'Inter', sans-serif" font-size="32" font-weight="800" fill="#FFFFFF">100.0000</text>
      <text x="920" y="48" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" text-anchor="end">Available: 430 PDEX</text>
      <text x="920" y="68" font-family="'Inter', sans-serif" font-size="12" fill="#00E676" text-anchor="end">MAX</text>
    </g>

    <!-- Footer button bar -->
    <g transform="translate(40, 730)">
      <rect x="0" y="0" width="200" height="48" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="100" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cancel</text>

      <!-- Primary Stake button - this is the action -->
      <rect x="-8" y="-8" width="976" height="64" rx="12" fill="rgba(230,0,122,0.18)" stroke="#E6007A" stroke-width="2" opacity="0.5" transform="translate(220, 0)"/>
      <rect x="220" y="0" width="740" height="48" rx="8" fill="#E6007A"/>
      <text x="590" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Stake 100 PDEX with 3 validators →</text>
    </g>

    <!-- Sign hint -->
    <text x="40" y="830" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Your wallet will pop up to sign — review the call data, then approve.</text>
  </g>

  <!-- Annotation: pointing at the Stake button -->
  <g>
    <defs>
      <marker id="arrow4" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="14" markerHeight="14" orient="auto">
        <polygon points="0,0 12,6 0,12" fill="#E6007A"/>
      </marker>
    </defs>
    <path d="M 1620 830 Q 1500 830 1480 800"
          stroke="#E6007A" stroke-width="3" fill="none" marker-end="url(#arrow4)"/>
    <rect x="1620" y="800" width="260" height="80" rx="10" fill="rgba(230,0,122,0.12)" stroke="#E6007A" stroke-width="2"/>
    <text x="1640" y="834" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#E6007A" font-weight="700">SIGN &amp; SUBMIT</text>
    <text x="1640" y="864" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Stake →</text>
  </g>

  <!-- Lower-third -->
  <g transform="translate(80, 920)">
    <rect x="0" y="0" width="880" height="110" rx="12" fill="#12121A"/>
    <rect x="0" y="0" width="6" height="110" rx="3" fill="#E6007A"/>
    <circle cx="80" cy="55" r="32" fill="#E6007A"/>
    <text x="80" y="70" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="142" y="46" font-family="'Inter', sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#00E676">STEP</text>
    <text x="142" y="86" font-family="'Inter', sans-serif" font-weight="700" font-size="34" fill="#FFFFFF">Set amount &amp; sign</text>
  </g>

</svg>
