<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shot 2 - Connect Wallet panel.
  Use behind narrator: "The explorer detects any wallet extension you've installed..."
  Annotation guides the eye to the Polkadot.js card we're going to click.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#08080C"/>

  <!-- Sidebar (faded to keep focus on main content) -->
  <rect x="0" y="0" width="260" height="1080" fill="#12121A" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="24" y="32" width="180" height="44" rx="6" fill="rgba(255,255,255,0.04)"/>
    <text x="50" y="60" font-family="'Inter', sans-serif" font-weight="800" font-size="18" fill="#E6007A">POLKADEX</text>
    <text x="40" y="146" font-family="'Inter', sans-serif" font-size="15" fill="#9CA3AF">Home</text>
    <rect x="16" y="426" width="228" height="40" rx="6" fill="rgba(230,0,122,0.12)"/>
    <text x="40" y="452" font-family="'Inter', sans-serif" font-size="15" fill="#E6007A" font-weight="700">My Account</text>
  </g>

  <!-- Topbar -->
  <rect x="260" y="0" width="1660" height="68" fill="#12121A"/>

  <!-- Main connect-wallet card -->
  <g transform="translate(300, 110)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#9CA3AF">CONNECT WALLET</text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">Connect a wallet to your account</text>
    <text x="0" y="90" font-family="'Inter', sans-serif" font-size="18" fill="#9CA3AF">The explorer reads your public address only. We never see your private key or seed.</text>

    <!-- Status banner -->
    <rect x="0" y="120" width="1540" height="60" rx="8" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>
    <circle cx="30" cy="150" r="6" fill="#00E676"/>
    <text x="50" y="156" font-family="'Inter', sans-serif" font-size="16" fill="#FFFFFF">Detected: <tspan font-weight="700">Polkadot.js</tspan></text>

    <!-- Extension cards grid (4 cards) -->
    <g transform="translate(0, 210)">
      <!-- Polkadot.js (highlighted) -->
      <g>
        <rect x="0" y="0" width="370" height="180" rx="12" fill="#12121A" stroke="#E6007A" stroke-width="3"/>
        <rect x="0" y="0" width="370" height="6" rx="3" fill="#E6007A"/>
        <circle cx="40" cy="60" r="22" fill="#E6007A" opacity="0.18"/>
        <text x="40" y="68" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#E6007A" text-anchor="middle">P</text>
        <text x="80" y="64" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Polkadot.js</text>
        <text x="80" y="92" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Reference extension</text>

        <rect x="20" y="130" width="330" height="38" rx="6" fill="#E6007A"/>
        <text x="185" y="156" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Connect →</text>
      </g>

      <!-- Talisman -->
      <g transform="translate(390, 0)">
        <rect x="0" y="0" width="370" height="180" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <circle cx="40" cy="60" r="22" fill="rgba(255,255,255,0.05)"/>
        <text x="40" y="68" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#9CA3AF" text-anchor="middle">T</text>
        <text x="80" y="64" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Talisman</text>
        <text x="80" y="92" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Multi-chain UI</text>
        <rect x="20" y="130" width="330" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="185" y="156" font-family="'Inter', sans-serif" font-size="15" fill="#9CA3AF" text-anchor="middle">Install</text>
      </g>

      <!-- SubWallet -->
      <g transform="translate(780, 0)">
        <rect x="0" y="0" width="370" height="180" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <circle cx="40" cy="60" r="22" fill="rgba(255,255,255,0.05)"/>
        <text x="40" y="68" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#9CA3AF" text-anchor="middle">S</text>
        <text x="80" y="64" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">SubWallet</text>
        <text x="80" y="92" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Desktop + mobile</text>
        <rect x="20" y="130" width="330" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="185" y="156" font-family="'Inter', sans-serif" font-size="15" fill="#9CA3AF" text-anchor="middle">Install</text>
      </g>

      <!-- PolkaGate -->
      <g transform="translate(1170, 0)">
        <rect x="0" y="0" width="370" height="180" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <circle cx="40" cy="60" r="22" fill="rgba(255,255,255,0.05)"/>
        <text x="40" y="68" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#9CA3AF" text-anchor="middle">G</text>
        <text x="80" y="64" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">PolkaGate</text>
        <text x="80" y="92" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Staking-first UX</text>
        <rect x="20" y="130" width="330" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="185" y="156" font-family="'Inter', sans-serif" font-size="15" fill="#9CA3AF" text-anchor="middle">Install</text>
      </g>
    </g>

    <!-- Mobile hint -->
    <text x="0" y="470" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#9CA3AF">ON MOBILE?</text>
    <text x="0" y="510" font-family="'Inter', sans-serif" font-size="18" fill="#FFFFFF">Open this page in <tspan font-weight="700" fill="#00E676">Nova Wallet</tspan> or <tspan font-weight="700" fill="#00E676">SubWallet</tspan>'s in-app browser.</text>
  </g>

  <!-- Annotation pointing at Polkadot.js card -->
  <g>
    <defs>
      <marker id="arrow2" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="14" markerHeight="14" orient="auto">
        <polygon points="0,0 12,6 0,12" fill="#E6007A"/>
      </marker>
    </defs>
    <path d="M 70 700 Q 230 620 300 470"
          stroke="#E6007A" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    <rect x="40" y="710" width="380" height="80" rx="10" fill="rgba(230,0,122,0.12)" stroke="#E6007A" stroke-width="2"/>
    <text x="60" y="744" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#E6007A" font-weight="700">DETECTED ON YOUR MACHINE</text>
    <text x="60" y="774" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Click Connect →</text>
  </g>

  <!-- Lower-third -->
  <g transform="translate(80, 920)">
    <rect x="0" y="0" width="880" height="110" rx="12" fill="#12121A"/>
    <rect x="0" y="0" width="6" height="110" rx="3" fill="#E6007A"/>
    <circle cx="80" cy="55" r="32" fill="#E6007A"/>
    <text x="80" y="70" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="142" y="46" font-family="'Inter', sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#00E676">STEP</text>
    <text x="142" y="86" font-family="'Inter', sans-serif" font-weight="700" font-size="34" fill="#FFFFFF">Pick an extension</text>
  </g>

</svg>
