<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shot 1 - Home page with "My Account" callout.
  Stylised mockup, not pixel-perfect. Drop into the timeline as B-roll while
  the narrator says "First, connect a wallet. Click 'My Account' in the sidebar."
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <!-- Dark background -->
  <rect width="1920" height="1080" fill="#08080C"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="1080" fill="#12121A" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Sidebar header / logo placeholder -->
  <rect x="24" y="32" width="180" height="44" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="60" font-family="'Inter', sans-serif" font-weight="800" font-size="18" fill="#E6007A">POLKADEX</text>

  <!-- Sidebar nav items -->
  <g font-family="'Inter', sans-serif" font-size="15" fill="#9CA3AF">
    <!-- Home (active) -->
    <rect x="16" y="120" width="228" height="40" rx="6" fill="rgba(230,0,122,0.12)"/>
    <text x="40" y="146" fill="#E6007A" font-weight="600">Home</text>
    <text x="40" y="196" fill="#9CA3AF">Validators</text>
    <text x="40" y="234" fill="#9CA3AF">Holders</text>
    <text x="40" y="272" fill="#9CA3AF">Blocks</text>
    <text x="40" y="310" fill="#9CA3AF">Transactions</text>
    <text x="40" y="348" fill="#9CA3AF">Events</text>

    <text x="40" y="408" fill="#6B7280" font-size="12" letter-spacing="2">MY WALLET</text>
    <!-- My Account - this is the callout target -->
    <rect id="callout-target" x="16" y="426" width="228" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="#00E676" stroke-width="2"/>
    <text x="40" y="452" fill="#FFFFFF" font-weight="700">My Account</text>
    <text x="40" y="498" fill="#9CA3AF">Staking Rewards</text>

    <text x="40" y="558" fill="#6B7280" font-size="12" letter-spacing="2">GOVERNANCE</text>
    <text x="40" y="600" fill="#9CA3AF">Democracy</text>
    <text x="40" y="638" fill="#9CA3AF">Council</text>
    <text x="40" y="676" fill="#9CA3AF">Treasury</text>
    <text x="40" y="714" fill="#9CA3AF">Discussions</text>
  </g>

  <!-- Topbar -->
  <rect x="260" y="0" width="1660" height="68" fill="#12121A" stroke="rgba(255,255,255,0.05)"/>
  <rect x="300" y="20" width="540" height="28" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="320" y="40" font-family="'Inter', sans-serif" font-size="13" fill="#6B7280">Search by address, block, transaction…</text>

  <!-- Top-right: PDEX price + Connect Wallet -->
  <text x="1620" y="40" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" text-anchor="end">PDEX</text>
  <text x="1700" y="40" font-family="'Inter', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="end">$0.1432</text>
  <text x="1700" y="58" font-family="'Inter', sans-serif" font-size="12" fill="#00E676" text-anchor="end">+2.1%</text>
  <rect x="1740" y="18" width="160" height="32" rx="6" fill="#E6007A"/>
  <text x="1820" y="40" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Connect Wallet</text>

  <!-- Main content - stats grid -->
  <g transform="translate(300, 110)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#9CA3AF">DASHBOARD</text>
    <text x="0" y="46" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">Polkadex Mainnet Explorer</text>

    <!-- 4 stat cards -->
    <g transform="translate(0, 90)">
      <g>
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Market cap</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">$58.3M</text>
        <text x="20" y="102" font-family="'Inter', sans-serif" font-size="12" fill="#00E676">+2.1% 24h</text>
      </g>
      <g transform="translate(390, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Total issuance</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">4.07M PDEX</text>
      </g>
      <g transform="translate(780, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">In stake</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">2.14M PDEX</text>
        <text x="20" y="102" font-family="'Inter', sans-serif" font-size="12" fill="#9CA3AF">52.6% of supply</text>
      </g>
      <g transform="translate(1170, 0)">
        <rect x="0" y="0" width="370" height="120" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="36" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">AVG APY</text>
        <text x="20" y="80" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#E6007A">14.8%</text>
        <text x="20" y="102" font-family="'Inter', sans-serif" font-size="12" fill="#9CA3AF">past 30 days</text>
      </g>
    </g>

    <!-- Network info row -->
    <g transform="translate(0, 240)">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="13" letter-spacing="2" fill="#9CA3AF">NETWORK INFORMATION</text>
      <rect x="0" y="16" width="1540" height="86" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <g font-family="'Inter', sans-serif">
        <text x="30" y="50" font-size="13" fill="#9CA3AF">Current era</text>
        <text x="30" y="82" font-size="22" font-weight="700" fill="#FFFFFF">1,742</text>

        <text x="290" y="50" font-size="13" fill="#9CA3AF">Validators (active / total)</text>
        <text x="290" y="82" font-size="22" font-weight="700" fill="#FFFFFF">22 / 87</text>

        <text x="660" y="50" font-size="13" fill="#9CA3AF">Nominators (active / total)</text>
        <text x="660" y="82" font-size="22" font-weight="700" fill="#FFFFFF">418 / 1,260</text>

        <text x="1040" y="50" font-size="13" fill="#9CA3AF">Max active stake</text>
        <text x="1040" y="82" font-size="22" font-weight="700" fill="#FFFFFF">192.4k PDEX</text>
      </g>
    </g>

    <!-- Recent blocks + transactions teaser -->
    <g transform="translate(0, 380)" opacity="0.5">
      <rect x="0" y="0" width="750" height="280" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Recent blocks</text>
      <rect x="790" y="0" width="750" height="280" rx="12" fill="#12121A" stroke="rgba(255,255,255,0.06)"/>
      <text x="810" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Recent transactions</text>
    </g>
  </g>

  <!-- Annotation: arrow + callout pointing at My Account -->
  <g>
    <!-- Arrow path: curves from the callout box (260, 446) to nowhere, ending with arrowhead -->
    <path d="M 580 446 Q 380 446 280 446"
          stroke="#E6007A" stroke-width="3" fill="none"
          marker-end="url(#arrow1)"/>
    <defs>
      <marker id="arrow1" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="14" markerHeight="14" orient="auto">
        <polygon points="0,0 12,6 0,12" fill="#E6007A"/>
      </marker>
    </defs>

    <!-- Callout label -->
    <rect x="580" y="406" width="320" height="80" rx="10" fill="rgba(230,0,122,0.12)" stroke="#E6007A" stroke-width="2"/>
    <text x="600" y="440" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#E6007A" font-weight="700">CLICK HERE</text>
    <text x="600" y="470" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">My Account →</text>
  </g>

  <!-- Step indicator (lower-third placeholder) -->
  <g transform="translate(80, 920)" opacity="0.95">
    <rect x="0" y="0" width="880" height="110" rx="12" fill="#12121A"/>
    <rect x="0" y="0" width="6" height="110" rx="3" fill="#E6007A"/>
    <circle cx="80" cy="55" r="32" fill="#E6007A"/>
    <text x="80" y="70" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="142" y="46" font-family="'Inter', sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#00E676">STEP</text>
    <text x="142" y="86" font-family="'Inter', sans-serif" font-weight="700" font-size="34" fill="#FFFFFF">Connect your wallet</text>
  </g>

</svg>
