    <rect x="1620" y="365" width="280" height="100" rx="10" fill="rgba(230,0,122,0.14)" stroke="#E6007A" stroke-width="2"/>
    <text x="1640" y="402" font-family="'Inter', sans-serif" font-size="13" letter-spacing="3" fill="#E6007A" font-weight="700">YOUR ACTUAL YIELD</text>
    <text x="1640" y="432" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Not theoretical</text>
    <text x="1640" y="454" font-family="'Inter', sans-serif" font-size="13" fill="#9CA3AF">Rolling 30 / 90 / all-time</text>
