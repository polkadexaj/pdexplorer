<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shot 5 - Staking Rewards page with Realized APR card spotlight.
  Behind narration: "The Realized APR card shows your actual yield..."
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#08080C"/>

  <!-- Sidebar (faded) -->
  <rect x="0" y="0" width="260" height="1080" fill="#12121A" opacity="0.6"/>
  <g opacity="0.4">
