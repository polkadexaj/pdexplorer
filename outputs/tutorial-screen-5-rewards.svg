        <rect x="300" y="65" width="40" height="75" fill="#E6007A" opacity="0.7"/>
        <rect x="360" y="55" width="40" height="85" fill="#E6007A"/>
        <rect x="420" y="75" width="40" height="65" fill="#E6007A" opacity="0.7"/>
        <rect x="480" y="60" width="40" height="80" fill="#E6007A" opacity="0.7"/>
        <rect x="540" y="50" width="40" height="90" fill="#E6007A"/>
        <rect x="600" y="70" width="40" height="70" fill="#E6007A" opacity="0.7"/>
        <rect x="660" y="45" width="40" height="95" fill="#E6007A"/>
        <rect x="720" y="55" width="40" height="85" fill="#E6007A"/>
        <rect x="780" y="65" width="40" height="75" fill="#E6007A" opacity="0.7"/>
        <rect x="840" y="40" width="40" height="100" fill="#E6007A"/>
        <rect x="900" y="50" width="40" height="90" fill="#E6007A"/>
