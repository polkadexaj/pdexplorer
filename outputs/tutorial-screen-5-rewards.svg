  <!-- Spotlight annotation -->
  <g>
    <defs>
      <marker id="arrow5" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="14" markerHeight="14" orient="auto">
        <polygon points="0,0 12,6 0,12" fill="#E6007A"/>
      </marker>
    </defs>
    <path d="M 1640 360 Q 1700 270 1700 220"
