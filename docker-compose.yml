
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pdexplorer-backend
    restart: unless-stopped
    ports:
      # Bind to loopback only. The frontend nginx container reaches the
      # backend over the Docker bridge network using DNS 'backend:3001',
      # not via the host port. Publishing 3001 to 0.0.0.0 would expose
      # the API directly and let clients bypass nginx (Cloudflare, cache
      # headers, /api allowlist, etc.). 127.0.0.1 keeps the port reachable
      # for `curl http://localhost:3001/...` diagnostics from the host
      # without exposing it to the network.
      - "127.0.0.1:3001:3001"
    # Pass every variable from the project's .env through to the container.
    # server.js reads all its knobs (POLKADEX_WS, CMC_API_KEY, BLOCKS_FORWARD_MAX,
    # ALLOWED_ORIGINS, NETWORK_INFO_REFRESH_MS, etc.) via process.env.
    # See .env.example for the full list and defaults.
    env_file:
      - .env
    volumes:
      # Host bind mount for the SQLite index (server.js DATA_DIR = /app/data).
      # A bind mount lives on the host filesystem, so the indexed data survives
      # container deletion, `docker compose down` (even with -v) and
      # `docker volume prune`. Override the host location with DATA_PATH in .env
      # (e.g. an absolute path outside the repo).
      - ${DATA_PATH:-./data}:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdexplorer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
